apiVersion: batch/v1
kind: CronJob
metadata:
  name: inference-batch
  namespace: default
spec:
  schedule: "0 1 * * *"
  timeZone: "Asia/Seoul"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: inference-batch-sa
          restartPolicy: OnFailure
          containers:
            - name: inference-batch
              image: your-registry/inference-batch:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: inference-batch-config
              command: ["python", "src/runtime/batch_runner.py"]
              args:
                - "--s3-silver-uri"
                - "$(S3_SILVER_URI)"
                - "--s3-daily-feature-uri"
                - "$(S3_DAILY_FEATURE_URI)"
                - "--s3-baseline-uri"
                - "$(S3_BASELINE_URI)"
                - "--model-uri"
                - "$(MODEL_URI)"
                - "--s3-output-uri"
                - "$(S3_OUTPUT_URI)"

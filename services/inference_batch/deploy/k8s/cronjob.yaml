apiVersion: batch/v1
kind: CronJob
metadata:
  name: inference-batch
  namespace: default
spec:
  schedule: "0 1 * * *"
  timeZone: "Asia/Seoul"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: inference-batch-sa
          restartPolicy: OnFailure
          containers:
            - name: inference-batch
              image: 715428147916.dkr.ecr.ap-northeast-2.amazonaws.com/inference-batch:0.3
              imagePullPolicy: IfNotPresent
              env:
                - name: AWS_STS_REGIONAL_ENDPOINTS
                  value: regional
                - name: AWS_DEFAULT_REGION
                  value: ap-northeast-2
                - name: AWS_REGION
                  value: ap-northeast-2
                - name: AWS_ROLE_ARN
                  value: arn:aws:iam::715428147916:role/msg-service-irsa-role
                - name: AWS_WEB_IDENTITY_TOKEN_FILE
                  value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
              envFrom:
                - configMapRef:
                    name: inference-batch-config
              volumeMounts:
                - name: aws-iam-token
                  mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
                  readOnly: true
              command: ["python", "src/runtime/batch_runner.py"]
              args:
                - "--s3-silver-uri"
                - "$(S3_SILVER_URI)"
                - "--s3-daily-feature-uri"
                - "$(S3_DAILY_FEATURE_URI)"
                - "--s3-baseline-uri"
                - "$(S3_BASELINE_URI)"
                - "--model-uri"
                - "$(MODEL_URI)"
                - "--s3-output-uri"
                - "$(S3_OUTPUT_URI)"
          volumes:
            - name: aws-iam-token
              projected:
                sources:
                  - serviceAccountToken:
                      audience: sts.amazonaws.com
                      expirationSeconds: 86400
                      path: token





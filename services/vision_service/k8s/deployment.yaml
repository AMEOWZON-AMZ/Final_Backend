apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-validate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-validate
  template:
    metadata:
      labels:
        app: vision-validate
    spec:
      serviceAccountName: vision-validate-sa
      containers:
        - name: vision-validate
          image: 715428147916.dkr.ecr.ap-northeast-2.amazonaws.com/vision-validate:0.5
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_NAME
              value: ViT-B-16-SigLIP
            - name: PRETRAINED
              value: webli
            - name: MAX_BYTES
              value: "10485760"
            - name: SCORE_THRESHOLD
              value: "0.05"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vision-validate-secret
                  key: database_url
            - name: TOPIC_TABLE
              value: challenge_days
            - name: TOPIC_TEXT_COLUMN
              value: title_en
            - name: TOPIC_DATE_COLUMN
              value: challenge_date
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-validate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-validate
  template:
    metadata:
      labels:
        app: vision-validate
    spec:
      serviceAccountName: vision-validate-sa
      containers:
        - name: vision-validate
          image: 715428147916.dkr.ecr.ap-northeast-2.amazonaws.com/vision-validate:0.1
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: ap-northeast-2
            - name: S3_BUCKET
              value: "REPLACE_ME_BUCKET"
            - name: S3_PREFIX
              value: topics
            - name: THRESHOLD
              value: "0.22"
            - name: MODEL_NAME
              value: ViT-B-32
            - name: PRETRAINED
              value: laion2b_s34b_b79k
            - name: MAX_BYTES
              value: "10485760"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

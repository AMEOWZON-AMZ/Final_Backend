version: '3.8'

services:
  # 사용자 Pod
  user-pod:
    build:
      context: ..
      dockerfile: docker/user_pod/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/user_db
    depends_on:
      - postgres
      - redis
    volumes:
      - ../app:/app
    networks:
      - microservice-network

  # 추론 Pod
  inference-pod:
    build:
      context: ..
      dockerfile: docker/inference_pod/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/inference_db
    depends_on:
      - postgres
      - redis
    volumes:
      - ../inference_pod:/app
    networks:
      - microservice-network

  # 메시지 Pod
  message-pod:
    build:
      context: ..
      dockerfile: docker/message_pod/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/message_db
    depends_on:
      - postgres
      - redis
    volumes:
      - ../message_pod:/app
    networks:
      - microservice-network

  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=microservice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - microservice-network

  # Redis (캐싱 및 세션)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservice-network

  # Nginx (API Gateway)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-pod
      - inference-pod
      - message-pod
    networks:
      - microservice-network

volumes:
  postgres_data:
  redis_data:

networks:
  microservice-network:
    driver: bridge
name: CD

on:
  # PR에서는 실행되지 않음. dev/main push에서만 CD 수행
  push:
    branches:
      - dev
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  # 이미지 빌드 정의 (key|dockerfile|context)
  IMAGES_JSON: |
    [
      {"key":"msg-service","dockerfile":"services/message_service/Dockerfile","context":"."},
      {"key":"inference-service","dockerfile":"services/inference_service/Dockerfile","context":"."},
      {"key":"vision-validate","dockerfile":"services/vision_service/Dockerfile","context":"."},
      {"key":"inference-batch","dockerfile":"services/inference_batch/Dockerfile","context":"services/inference_batch"}
    ]

  # 업데이트 대상 정의 (kind|name|container|image_key)
  # TEMP: FCM secret 복구 전까지 push-worker 제외
  TARGETS_JSON: |
    [
      {"kind":"deployment","name":"msg-service","container":"msg-service","image_key":"msg-service"},
      {"kind":"deployment","name":"inference-service","container":"inference-service","image_key":"inference-service"},
      {"kind":"deployment","name":"vision-validate","container":"vision-validate","image_key":"vision-validate"},
      {"kind":"cronjob","name":"inference-batch","container":"inference-batch","image_key":"inference-batch"},
      {"kind":"cronjob","name":"daily-status-sync","container":"daily-status-sync","image_key":"inference-service"}
    ]

jobs:
  deploy:
    name: Build, Push, Deploy (Namespaced)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "namespace=${{ secrets.STAGING_NAMESPACE }}" >> "$GITHUB_OUTPUT"
            echo "deploy_env=staging" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "namespace=${{ secrets.PROD_NAMESPACE }}" >> "$GITHUB_OUTPUT"
            echo "deploy_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Ensure jq installed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-cd-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Build and push images
        id: build
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          set -euo pipefail

          image_map='{}'
          while read -r item; do
            key=$(echo "$item" | jq -r '.key')
            dockerfile=$(echo "$item" | jq -r '.dockerfile')
            context=$(echo "$item" | jq -r '.context')

            image_uri="${ECR_REGISTRY}/${ECR_REPO}:${key}-${GITHUB_RUN_NUMBER}"

            echo "Building ${key}"
            docker build -f "${dockerfile}" -t "${image_uri}" "${context}"
            docker push "${image_uri}"

            image_map=$(echo "$image_map" | jq --arg k "$key" --arg v "$image_uri" '. + {($k): $v}')
          done < <(echo "${IMAGES_JSON}" | jq -c '.[]')

          echo "image_map=${image_map}" >> "$GITHUB_OUTPUT"

      - name: Update workloads and verify
        shell: bash
        env:
          NAMESPACE: ${{ steps.target.outputs.namespace }}
          IMAGE_MAP: ${{ steps.build.outputs.image_map }}
        run: |
          set -euo pipefail

          echo "Target namespace: ${NAMESPACE}"

          echo "${TARGETS_JSON}" | jq -c '.[]' | while read -r t; do
            kind=$(echo "$t" | jq -r '.kind')
            name=$(echo "$t" | jq -r '.name')
            container=$(echo "$t" | jq -r '.container')
            image_key=$(echo "$t" | jq -r '.image_key')
            image_uri=$(echo "$IMAGE_MAP" | jq -r --arg k "$image_key" '.[$k]')

            if [ -z "$image_uri" ] || [ "$image_uri" = "null" ]; then
              echo "No built image for key: ${image_key}"
              exit 1
            fi

            echo "Updating ${kind}/${name} (${container}) -> ${image_uri}"
            kubectl -n "${NAMESPACE}" set image "${kind}/${name}" "${container}=${image_uri}"

            if [ "$kind" = "deployment" ]; then
              kubectl -n "${NAMESPACE}" rollout status "deployment/${name}" --timeout=300s
            else
              applied=$(kubectl -n "${NAMESPACE}" get "cronjob/${name}" -o jsonpath="{.spec.jobTemplate.spec.template.spec.containers[?(@.name=='${container}')].image}")
              if [ "$applied" != "$image_uri" ]; then
                echo "CronJob image verify failed: expected=${image_uri}, actual=${applied}"
                exit 1
              fi
            fi
          done

          echo "All workloads updated successfully."


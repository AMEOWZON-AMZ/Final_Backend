name: CI

on:
  pull_request:
    branches:
      - dev
      - main
      - "**"

permissions:
  contents: read

jobs:
  test:
    name: Run tests on PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install dependencies and run tests
        shell: bash
        run: |
          set -euo pipefail

          SERVICES=("inference_batch" "inference_service" "message_service" "vision_service")
          ran_any=0

          for svc in "${SERVICES[@]}"; do
            req="services/${svc}/requirements.txt"
            tests_dir="services/${svc}/tests"

            if [ -f "$req" ]; then
              echo "Installing deps for $svc"
              pip install -r "$req"
            fi

            if [ -d "$tests_dir" ]; then
              echo "Running tests for $svc"
              pytest -q "$tests_dir"
              ran_any=1
            else
              echo "No tests directory for $svc, skipping"
            fi
          done

          if [ "$ran_any" -eq 0 ]; then
            echo "No tests found in configured services. CI passed (nothing to run)."
          fi

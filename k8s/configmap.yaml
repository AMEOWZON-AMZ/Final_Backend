apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: user-service
data:
  APP_NAME: "User Pod Backend API"
  VERSION: "1.0.0"
  DEBUG: "false"  # 프로덕션에서는 false
  ENVIRONMENT: "production"
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  
  # RDS 설정 (프로덕션)
  USE_RDS: "true"  # RDS 사용
  RDS_HOST: "user-service-cluster.cluster-cn4w6k04aq5d.ap-northeast-2.rds.amazonaws.com"
  RDS_PORT: "5432"
  RDS_DATABASE: "postgres"
  RDS_USERNAME: "user_admin"
  
  # DynamoDB 설정 (AWS DynamoDB with Pod Identity)
  USE_LOCAL_DYNAMODB: "false"  # AWS DynamoDB 사용
  DYNAMODB_REGION: "ap-northeast-2"
  # DYNAMODB_ENDPOINT_URL은 설정하지 않음 (AWS DynamoDB 사용)
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  COGNITO_REGION: "ap-northeast-2"
  COGNITO_USER_POOL_ID: "ap-northeast-2_2tlc2TiI2"
  COGNITO_CLIENT_ID: "1ki1nh4k93ctoqhm1hmu7ekhj5"
  COGNITO_ISSUER: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_2tlc2TiI2"
  AWS_REGION: "ap-northeast-2"
  S3_BUCKET_NAME: "ameowzon-test-files"
  S3_BASE_URL: "https://ameowzon-test-files.s3.ap-northeast-2.amazonaws.com"
  MAX_FILE_SIZE: "10485760"